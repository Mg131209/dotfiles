# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
#

font_family  JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14

## scaling with ctrl + or -
map ctrl+,    change_font_size all +1.0
map ctrl+.    change_font_size all -1.0
map ctrl+0    change_font_size all 0
